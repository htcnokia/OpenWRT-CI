name: Upstream Sync & Auto Inject

on:
  #自动同步：每天早上4点
  schedule:
    - cron: 0 4 * * *
  #手动清理
  workflow_dispatch:

permissions: write-all

jobs:
  sync_and_inject:
    runs-on: ubuntu-latest
    name: Sync, Inject Custom Packages, and Private Script Generation
    
    env:
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24

    steps:
    # 第一步：检出仓库
    - name: Checkout target repo
      uses: actions/checkout@v4
      with:
        ref: main
        persist-credentials: true
        fetch-depth: 0

    # 第二步：同步上游
    - name: Sync upstream changes via Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git remote add upstream https://github.com/VIKINGYFY/OpenWRT-CI.git
        git fetch upstream main
        git merge upstream/main --allow-unrelated-histories -m "🔄 Sync upstream changes" || echo "No remote changes or handled manually"

    # 第三步：安全推送
    - name: Push Changes Safely
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "✨ 检测到变动，正在提交私有扩充脚本..."
          git add .
          git commit -m "⚙️ Auto Inject: Generated ultra-clean PRIVATE.sh"
          git push origin main
          echo "✅ 成功推送！"
        else
          echo "🛑 已经是最新，无变动。"
        fi
