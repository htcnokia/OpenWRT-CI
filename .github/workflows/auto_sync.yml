name: Auto Sync Fork

on:
  schedule:
    # 北京时间凌晨 04:30 自动触发同步（比母项目动作提前 30 分钟）
    - cron: '30 20 * * *'
  workflow_dispatch: # 允许在 GitHub 网页上随时手动点击运行

jobs:
  sync:
    name: Sync with VIKINGYFY
    runs-on: ubuntu-latest
    steps:
      # Step 1: 检出 htcnokia/OpenWRT-CI 仓库
      - name: Checkout Your Fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # 获取完整历史

      # Step 2: 配置 Git 机器人信息
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Step 3: 强制同步上游母项目
      - name: Sync Upstream
        run: |
          # 添加 VIKINGYFY 的源仓库
          git remote add upstream https://github.com/VIKINGYFY/OpenWRT-CI.git
          git fetch upstream
          
          # 切换到主分支
          git checkout main
          
          # 强行覆盖本地分支，与上游保持 100% 绝对一致
          git reset --hard upstream/main
          
          # 强行推送到你自己的 GitHub 仓库
          git push origin main --force
